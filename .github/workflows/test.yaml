name: Run Tests

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install YOLO dependencies
        run: |
          pip install -r services/yolo/torch-requirements.txt
          pip install -r services/yolo/requirements.txt

      - name: Run YOLO tests with coverage
        run: pytest --cov=app --cov-report=xml tests/
        working-directory: services/yolo

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: services/yolo/coverage.xml
          fail_ci_if_error: true

  test-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Agent dependencies
        run: |
          pip install pytest
          pip install -r services/agent/requirements.txt

      - name: Run agent tests
        run: pytest tests/ -q
        working-directory: services/agent