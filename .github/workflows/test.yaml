name: Run Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install YOLO dependencies
        run: |
          pip install -r services/yolo/torch-requirements.txt
          pip install -r services/yolo/requirements.txt

      - name: Run YOLO tests with coverage
        run: pytest --cov=app --cov-report=xml tests/
        working-directory: services/yolo

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: services/yolo/coverage.xml
          flags: yolo
          name: yolo-py312
          fail_ci_if_error: true

  test-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Agent dependencies
        run: |
          pip install pytest
          pip install -r services/agent/requirements.txt

      - name: Run agent tests
        run: pytest tests/ -q
        working-directory: services/agent

  docker-scout:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build YOLO Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/yolo
          push: false
          load: true
          tags: rinaahmd/yolo-service:ci-scan

      - name: Docker Scout CVE scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: rinaahmd/yolo-service:ci-scan

      - name: Build Agent Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/agent
          push: false
          load: true
          tags: rinaahmd/agent-service:ci-scan

      - name: Docker Scout CVE scan (Agent)
        uses: docker/scout-action@v1
        with:
          command: cves
          image: rinaahmd/agent-service:ci-scan

      - name: Build Frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/frontend
          push: false
          load: true
          tags: rinaahmd/frontend-service:ci-scan

      - name: Docker Scout CVE scan (Frontend)
        uses: docker/scout-action@v1
        with:
          command: cves
          image: rinaahmd/frontend-service:ci-scan