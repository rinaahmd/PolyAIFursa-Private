name: Deploy Services

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      agent: ${{ steps.filter.outputs.agent }}
      yolo: ${{ steps.filter.outputs.yolo }}
      frontend: ${{ steps.filter.outputs.frontend }}
      img-proc-mcp: ${{ steps.filter.outputs['img-proc-mcp'] }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            agent:
              - 'services/agent/**'
            yolo:
              - 'services/yolo/**'
            frontend:
              - 'services/frontend/**'
            img-proc-mcp:
              - 'services/img-proc-mcp/**'

  deploy-agent:
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: services/agent
          push: true
          tags: rinaahmd/agent-service:${{ github.sha }}

      - name: Deploy agent
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ github.ref_name == 'main' && secrets.PROD_INSTANCE_IP || secrets.DEV_INSTANCE_IP }}
          username: ubuntu
          key: ${{ github.ref_name == 'main' && secrets.PROD_INSTANCE_SSH_KEY || secrets.DEV_INSTANCE_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/PolyAIFursa-Private
            git fetch origin
            git checkout ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}

            export AGENT_IMAGE_TAG=${{ github.sha }}
            docker compose -f docker-compose.yml pull agent
            docker compose -f docker-compose.yml up -d agent

            for i in $(seq 1 60); do
              curl -fsS http://localhost:8000/health && exit 0
              echo "Waiting for agent to be ready... ($i/60)"
              sleep 1
            done
            echo "agent failed to become ready within 60 seconds"
            exit 1

  deploy-yolo:
    needs: changes
    if: needs.changes.outputs.yolo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push yolo image
        uses: docker/build-push-action@v6
        with:
          context: services/yolo
          push: true
          tags: rinaahmd/yolo-service:${{ github.sha }}

      - name: Deploy yolo
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ github.ref_name == 'main' && secrets.PROD_INSTANCE_IP || secrets.DEV_INSTANCE_IP }}
          username: ubuntu
          key: ${{ github.ref_name == 'main' && secrets.PROD_INSTANCE_SSH_KEY || secrets.DEV_INSTANCE_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/PolyAIFursa-Private
            git fetch origin
            git checkout ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}

            export YOLO_IMAGE_TAG=${{ github.sha }}
            docker compose -f docker-compose.yml pull yolo
            docker compose -f docker-compose.yml up -d yolo

            for i in $(seq 1 60); do
              curl -fsS http://localhost:8080/health && exit 0
              echo "Waiting for yolo to be ready... ($i/60)"
              sleep 1
            done
            echo "yolo failed to become ready within 60 seconds"
            exit 1

  deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: services/frontend
          push: true
          tags: rinaahmd/frontend-service:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_AGENT_URL=${{ github.ref_name == 'main' && 'http://3.214.66.146:8000' || 'http://34.224.235.157:8000' }}

      - name: Deploy frontend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ github.ref_name == 'main' && secrets.PROD_INSTANCE_IP || secrets.DEV_INSTANCE_IP }}
          username: ubuntu
          key: ${{ github.ref_name == 'main' && secrets.PROD_INSTANCE_SSH_KEY || secrets.DEV_INSTANCE_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/PolyAIFursa-Private
            git fetch origin
            git checkout ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}

            export FRONTEND_IMAGE_TAG=${{ github.sha }}
            export NEXT_PUBLIC_AGENT_URL=${{ github.ref_name == 'main' && 'http://3.214.66.146:8000' || 'http://34.224.235.157:8000' }}
            docker compose -f docker-compose.yml pull frontend
            docker compose -f docker-compose.yml up -d frontend

            for i in $(seq 1 60); do
              curl -fsS http://localhost:3000 && exit 0
              echo "Waiting for frontend to be ready... ($i/60)"
              sleep 1
            done
            echo "frontend failed to become ready within 60 seconds"
            exit 1

  deploy-img-proc-mcp:
    needs: changes
    if: needs.changes.outputs['img-proc-mcp'] == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push img-proc-mcp image
        uses: docker/build-push-action@v6
        with:
          context: services/img-proc-mcp
          push: true
          tags: rinaahmd/img-proc-mcp-service:${{ github.sha }}

      - name: Deploy img-proc-mcp
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ github.ref_name == 'main' && secrets.PROD_INSTANCE_IP || secrets.DEV_INSTANCE_IP }}
          username: ubuntu
          key: ${{ github.ref_name == 'main' && secrets.PROD_INSTANCE_SSH_KEY || secrets.DEV_INSTANCE_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/PolyAIFursa-Private
            git fetch origin
            git checkout ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}

            export IMG_PROC_MCP_IMAGE_TAG=${{ github.sha }}
            docker compose -f docker-compose.yml pull img-proc-mcp
            docker compose -f docker-compose.yml up -d img-proc-mcp

            # img-proc-mcp has no /health endpoint - it's an MCP server, and a plain
            # GET to /mcp correctly returns 406 (it requires MCP protocol headers).
            # Just check the port accepts connections at all, not for a 2xx status.
            for i in $(seq 1 60); do
              curl -sS -o /dev/null http://localhost:9000/mcp && exit 0
              echo "Waiting for img-proc-mcp to be ready... ($i/60)"
              sleep 1
            done
            echo "img-proc-mcp failed to become ready within 60 seconds"
            exit 1
