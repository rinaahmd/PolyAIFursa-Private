name: Deploy Services

on:
  push:
    branches:
      - main
      - dev



permissions:
  contents: read

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Dev instance
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_INSTANCE_IP }}
          username: ubuntu
          key: ${{ secrets.DEV_INSTANCE_SSH_KEY }}
          script: |
            set -e

            cd /home/ubuntu/PolyAIFursa-Private
            git fetch origin
            git checkout dev
            git pull origin dev

            sudo systemctl restart docker
            sudo systemctl status docker --no-pager

            docker pull rinaahmd/yolo-service:0.0.1
            docker pull rinaahmd/agent-service:0.0.1

            docker build -t frontend-service:dev \
              --build-arg NEXT_PUBLIC_AGENT_URL=http://34.224.235.157:8000 \
              /home/ubuntu/PolyAIFursa-Private/services/frontend

            docker rm -f frontend agent yolo || true

            docker run -d --name yolo \
              -v /home/ubuntu/.aws:/root/.aws:ro \
              -e AWS_REGION=us-east-1 \
              -e AWS_S3_BUCKET=rina-polyai-images \
              -p 8080:8080 \
              rinaahmd/yolo-service:0.0.1

            docker run -d --name agent \
              --env-file /home/ubuntu/PolyAIFursa-Private/services/agent/.env \
              --add-host=host.docker.internal:host-gateway \
              -v /home/ubuntu/.aws:/root/.aws:ro \
              -p 8000:8000 \
              rinaahmd/agent-service:0.0.1

            docker run -d --name frontend \
              --add-host=host.docker.internal:host-gateway \
              -p 3000:3000 \
              frontend-service:dev

            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'

            wait_for_service() {
              local name="$1"
              local url="$2"
              local max_retries=60
              local retries=0

              until curl -fsS "$url" > /dev/null; do
                retries=$((retries + 1))
                if [ "$retries" -ge "$max_retries" ]; then
                  echo "Service '$name' failed to become ready within 60 seconds: $url"
                  return 1
                fi
                echo "Waiting for '$name' to be ready... ($retries/$max_retries)"
                sleep 1
              done

              echo "Service '$name' is ready: $url"
            }

            wait_for_service "yolo" "http://localhost:8080/health"
            wait_for_service "agent" "http://localhost:8000/health"
            wait_for_service "frontend" "http://localhost:3000"

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Prod instance
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_INSTANCE_IP }}
          username: ubuntu
          key: ${{ secrets.PROD_INSTANCE_SSH_KEY }}
          script: |
            set -e

            cd /home/ubuntu/PolyAIFursa-Private
            git fetch origin
            git checkout main
            git pull origin main

            sudo systemctl restart docker
            sudo systemctl status docker --no-pager

            docker pull rinaahmd/yolo-service:0.0.1
            docker pull rinaahmd/agent-service:0.0.1
            docker pull rinaahmd/frontend-service:0.0.1

            docker rm -f frontend agent yolo || true

            docker run -d --name yolo \
              -v /home/ubuntu/.aws:/root/.aws:ro \
              -e AWS_REGION=us-east-1 \
              -e AWS_S3_BUCKET=rina-polyai-images \
              -p 8080:8080 \
              rinaahmd/yolo-service:0.0.1

            docker run -d --name agent \
              --env-file /home/ubuntu/PolyAIFursa-Private/services/agent/.env \
              --add-host=host.docker.internal:host-gateway \
              -v /home/ubuntu/.aws:/root/.aws:ro \
              -p 8000:8000 \
              rinaahmd/agent-service:0.0.1

            docker run -d --name frontend \
              -e NEXT_PUBLIC_AGENT_URL=http://3.214.66.146:8000 \
              --add-host=host.docker.internal:host-gateway \
              -p 3000:3000 \
              rinaahmd/frontend-service:0.0.1

            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'

            wait_for_service() {
              local name="$1"
              local url="$2"
              local max_retries=60
              local retries=0

              until curl -fsS "$url" > /dev/null; do
                retries=$((retries + 1))
                if [ "$retries" -ge "$max_retries" ]; then
                  echo "Service '$name' failed to become ready within 60 seconds: $url"
                  return 1
                fi
                echo "Waiting for '$name' to be ready... ($retries/$max_retries)"
                sleep 1
              done

              echo "Service '$name' is ready: $url"
            }

            wait_for_service "yolo" "http://localhost:8080/health"
            wait_for_service "agent" "http://localhost:8000/health"
            wait_for_service "frontend" "http://localhost:3000"
