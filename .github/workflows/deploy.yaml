name: Deploy Services

on:
  push:
    branches:
      - main
      - dev



permissions:
  contents: read

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Dev instance
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_INSTANCE_IP }}
          username: ubuntu
          key: ${{ secrets.DEV_INSTANCE_SSH_KEY }}
          script: |
            set -e

            cd /home/ubuntu/PolyAIFursa-Private
            git fetch origin
            git checkout dev
            git reset --hard origin/dev

            if systemctl list-unit-files | grep -q '^docker.service'; then
              sudo systemctl restart docker
              sudo systemctl status docker --no-pager
            else
              echo "docker.service not found, skipping Docker restart"
            fi

            export NEXT_PUBLIC_AGENT_URL=http://34.224.235.157:8000
            docker compose -f docker-compose.yml pull agent yolo && \
            docker compose -f docker-compose.yml down && \
            docker compose -f docker-compose.yml build --no-cache frontend && \
            docker compose -f docker-compose.yml up -d frontend agent yolo
            docker compose -f docker-compose.yml ps

            wait_for_service() {
              local name="$1"
              local url="$2"
              local max_retries=60
              local retries=0

              until curl -fsS "$url" > /dev/null; do
                retries=$((retries + 1))
                if [ "$retries" -ge "$max_retries" ]; then
                  echo "Service '$name' failed to become ready within 60 seconds: $url"
                  return 1
                fi
                echo "Waiting for '$name' to be ready... ($retries/$max_retries)"
                sleep 1
              done

              echo "Service '$name' is ready: $url"
            }

            wait_for_service "yolo" "http://localhost:8080/health"
            wait_for_service "agent" "http://localhost:8000/health"
            wait_for_service "frontend" "http://localhost:3000"

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Prod instance
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_INSTANCE_IP }}
          username: ubuntu
          key: ${{ secrets.PROD_INSTANCE_SSH_KEY }}
          script: |
            set -e

            cd /home/ubuntu/PolyAIFursa-Private
            git fetch origin
            git checkout main
            git reset --hard origin/main

            if systemctl list-unit-files | grep -q '^docker.service'; then
              sudo systemctl restart docker
              sudo systemctl status docker --no-pager
            else
              echo "docker.service not found, skipping Docker restart"
            fi

            export NEXT_PUBLIC_AGENT_URL=http://3.214.66.146:8000
            docker compose -f docker-compose.yml pull agent yolo && \
            docker compose -f docker-compose.yml down && \
            docker compose -f docker-compose.yml build --no-cache frontend && \
            docker compose -f docker-compose.yml up -d frontend agent yolo
            docker compose -f docker-compose.yml ps

            wait_for_service() {
              local name="$1"
              local url="$2"
              local max_retries=60
              local retries=0

              until curl -fsS "$url" > /dev/null; do
                retries=$((retries + 1))
                if [ "$retries" -ge "$max_retries" ]; then
                  echo "Service '$name' failed to become ready within 60 seconds: $url"
                  return 1
                fi
                echo "Waiting for '$name' to be ready... ($retries/$max_retries)"
                sleep 1
              done

              echo "Service '$name' is ready: $url"
            }

            wait_for_service "yolo" "http://localhost:8080/health"
            wait_for_service "agent" "http://localhost:8000/health"
            wait_for_service "frontend" "http://localhost:3000"
